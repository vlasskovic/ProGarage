<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalendar Termina | ProGarage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "as-bg": "#dde0e4",
              "as-accent": "#6599d3",
              "as-text": "#000000",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-as-bg font-sans text-as-text">
    <div class="flex h-screen">
      <aside class="w-64 bg-white shadow-xl flex flex-col p-6">
        <div class="text-2xl font-black mb-10">
          Pro<span class="text-as-accent">Garage</span>
        </div>
        <nav class="space-y-4 flex-1">
          <a href="/dashboard.html" class="block p-3 rounded-xl hover:bg-gray-100 transition">🏠 Dashboard</a>
          <a href="/calendar.html" class="block p-3 rounded-xl bg-as-accent text-white font-bold shadow-md">📅 Kalendar</a>
          <a href="/inventory.html" class="block p-3 rounded-xl hover:bg-gray-100 transition">📦 Magacin</a>
        </nav>
        <button onclick="logout()" class="text-red-500 font-bold p-3 text-left hover:bg-red-50 transition rounded-xl">
          🚪 Odjavi se
        </button>
      </aside>

      <main class="flex-1 overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-10">
          <h1 class="text-3xl font-black">
            Kalendar <span class="text-as-accent text-xl">/ Svi termini</span>
          </h1>

          <div class="flex bg-gray-200/50 p-1 rounded-2xl w-64 shadow-inner">
            <button id="btn-list" onclick="toggleView('list')" class="flex-1 py-2 rounded-xl font-bold text-sm transition-all duration-300 bg-as-accent text-white shadow-md">
              Lista
            </button>
            <button id="btn-month" onclick="toggleView('month')" class="flex-1 py-2 rounded-xl font-bold text-sm transition-all duration-300 text-gray-500">
              Mesečno
            </button>
          </div>
        </header>

        <div id="listViewContainer" class="bg-white rounded-3xl shadow-sm overflow-hidden">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-100">
                <th class="p-5 text-xs font-bold text-gray-400 uppercase">Vreme i Datum</th>
                <th class="p-5 text-xs font-bold text-gray-400 uppercase">Klijent i Vozilo</th>
                <th class="p-5 text-xs font-bold text-gray-400 uppercase">Usluga</th>
                <th class="p-5 text-xs font-bold text-gray-400 uppercase">Status</th>
                <th class="p-5 text-xs font-bold text-gray-400 uppercase text-right">Akcija</th>
              </tr>
            </thead>
            <tbody id="calendarTableBody">
              </tbody>
          </table>
        </div>

        <div id="monthView" class="hidden bg-white rounded-3xl shadow-sm p-6">
          <div class="flex items-center justify-between mb-6">
            <h2 id="currentMonthYear" class="text-xl font-bold text-as-text uppercase tracking-widest">Mart 2026</h2>
            <div class="flex space-x-2">
              <button onclick="changeMonth(-1)" class="p-2 hover:bg-as-bg rounded-lg transition">◀</button>
              <button onclick="changeMonth(1)" class="p-2 hover:bg-as-bg rounded-lg transition">▶</button>
            </div>
          </div>
          <div class="grid grid-cols-7 gap-px bg-gray-100 border border-gray-100 rounded-xl overflow-hidden">
            <div class="bg-gray-50 p-2 text-center text-[10px] font-bold text-gray-400 uppercase">Pon</div>
            <div class="bg-gray-50 p-2 text-center text-[10px] font-bold text-gray-400 uppercase">Uto</div>
            <div class="bg-gray-50 p-2 text-center text-[10px] font-bold text-gray-400 uppercase">Sre</div>
            <div class="bg-gray-50 p-2 text-center text-[10px] font-bold text-gray-400 uppercase">Čet</div>
            <div class="bg-gray-50 p-2 text-center text-[10px] font-bold text-gray-400 uppercase">Pet</div>
            <div class="bg-gray-50 p-2 text-center text-[10px] font-bold text-gray-400 uppercase">Sub</div>
            <div class="bg-gray-50 p-2 text-center text-[10px] font-bold text-gray-400 uppercase">Ned</div>
            <div id="calendarGrid" class="contents"></div>
          </div>
        </div>
      </main>
    </div>

    <div id="appointmentModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
      <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden transform transition-all">
        <div class="bg-as-accent p-6 text-white flex justify-between items-center">
          <div>
            <h3 class="text-xl font-bold" id="m-car">Vozilo</h3>
            <p class="text-xs opacity-80" id="m-time">Datum i vreme</p>
          </div>
          <button onclick="closeModal()" class="text-2xl font-bold hover:rotate-90 transition-transform">&times;</button>
        </div>

        <div class="p-8 space-y-6">
          <div class="grid grid-cols-2 gap-6">
            <div>
              <p class="text-[10px] font-bold text-gray-400 uppercase">Klijent</p>
              <p class="font-bold text-as-text" id="m-client">-</p>
            </div>
            <div>
              <p class="text-[10px] font-bold text-gray-400 uppercase">Usluga</p>
              <p class="font-bold text-as-text" id="m-service">-</p>
            </div>
          </div>

          <hr class="border-gray-100" />

          <div>
            <p class="text-[10px] font-bold text-gray-400 uppercase mb-3">Status Servisa</p>
            <div class="grid grid-cols-3 gap-2">
              <button onclick="updateStatus('zakazano')" id="status-zakazano" class="status-btn border-2 p-2 rounded-xl text-[10px] font-bold transition">ZAKAZANO</button>
              <button onclick="updateStatus('u_toku')" id="status-u_toku" class="status-btn border-2 p-2 rounded-xl text-[10px] font-bold transition">U TOKU</button>
              <button onclick="updateStatus('završeno')" id="status-završeno" class="status-btn border-2 p-2 rounded-xl text-[10px] font-bold transition">ZAVRŠENO</button>
            </div>
          </div>

          <div class="pt-4 flex justify-between items-center">
            <button onclick="deleteAppointment()" class="text-red-500 text-xs font-bold hover:bg-red-50 px-3 py-2 rounded-lg transition">
              🗑️ Storniraj termin
            </button>
            <button onclick="closeModal()" class="bg-gray-100 text-as-text px-6 py-2 rounded-xl font-bold text-sm hover:bg-gray-200 transition">
              Zatvori
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // 1. Inicijalizacija korisnika iz LocalStorage-a
      const user = JSON.parse(localStorage.getItem("user"));
      if (!user) window.location.href = "/login.html";

      let currentViewDate = new Date(); // Za navigaciju kroz mesece
      let currentEditingId = null;     // Prati koji termin menjamo u modalu

      /**
       * Učitava termine i osvežava prikaz tabele
       */
      async function loadCalendar() {
        try {
          const res = await fetch(`http://localhost:3000/api/appointments/${encodeURIComponent(user.serviceName)}`);
          const appointments = await res.json();

          const tbody = document.getElementById("calendarTableBody");
          tbody.innerHTML = "";

          // Sortiranje po datumu uzlazno
          appointments.sort((a, b) => new Date(a.time) - new Date(b.time));

          appointments.forEach((app) => {
            const date = new Date(app.time);
            const dateStr = date.toLocaleDateString("sr-RS");
            const timeStr = date.toLocaleTimeString("sr-RS", { hour: "2-digit", minute: "2-digit" });

            const statusClasses = {
              zakazano: "bg-blue-100 text-blue-600",
              u_toku: "bg-yellow-100 text-yellow-600",
              završeno: "bg-green-100 text-green-600",
            };

            tbody.innerHTML += `
              <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition">
                <td class="p-5 text-sm font-bold">${timeStr} <span class="block font-normal text-xs text-gray-400">${dateStr}</span></td>
                <td class="p-5 text-sm font-bold">${app.client} <span class="block font-normal text-xs text-gray-500">${app.car}</span></td>
                <td class="p-5 text-sm text-gray-600">${app.serviceType}</td>
                <td class="p-5">
                  <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${statusClasses[app.status]}">
                    ${app.status.replace("_", " ")}
                  </span>
                </td>
                <td class="p-5 text-right">
                  <button onclick='openAppointmentModal(${JSON.stringify(app)})' class="text-as-accent font-bold text-xs hover:underline">Detalji</button>
                </td>
              </tr>`;
          });

          // Ako je otvoren kalendar, osveži i njega
          if (!document.getElementById("monthView").classList.contains("hidden")) renderMonthView();
        } catch (e) { console.error("Greška pri učitavanju:", e); }
      }

      /**
       * STORNIRANJE TERMINA (Brisanje)
       */
      async function deleteAppointment() {
        if (!currentEditingId) return;

        const result = await Swal.fire({
          title: 'Da li ste sigurni?',
          text: "Ova radnja će trajno obrisati termin iz kalendara!",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          cancelButtonColor: '#6599d3',
          confirmButtonText: 'Da, storniraj!',
          cancelButtonText: 'Odustani'
        });

        if (result.isConfirmed) {
          try {
            const res = await fetch(`http://localhost:3000/api/appointments/${currentEditingId}`, { method: "DELETE" });
            if (res.ok) {
              Swal.fire('Obrisano!', 'Termin je uspešno uklonjen.', 'success');
              closeModal();
              loadCalendar(); // Osveži listu odmah
            }
          } catch (e) { Swal.fire('Greška', 'Server nije odgovorio.', 'error'); }
        }
      }

      /**
       * AŽURIRANJE STATUSA (Zakazano -> U toku -> Završeno)
       */
      async function updateStatus(newStatus) {
        if (!currentEditingId) return;
        try {
          const res = await fetch(`http://localhost:3000/api/appointments/${currentEditingId}/status`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status: newStatus }),
          });
          if (res.ok) {
            localStorage.setItem('dashboardRefreshSignal', Date.now().toString());
            closeModal();
            loadCalendar();
          }
        } catch (e) { console.error(e); }
      }

      /**
       * MODAL LOGIKA
       */
      function openAppointmentModal(app) {
        currentEditingId = app.id;
        document.getElementById("m-car").innerText = app.car;
        document.getElementById("m-client").innerText = app.client;
        document.getElementById("m-service").innerText = app.serviceType;
        const d = new Date(app.time);
        document.getElementById("m-time").innerText = `${d.toLocaleDateString("sr-RS")} u ${d.toLocaleTimeString("sr-RS", {hour:'2-digit', minute:'2-digit'})}`;

        // Reset statusnih dugmića
        document.querySelectorAll(".status-btn").forEach(btn => {
          btn.className = "status-btn border-2 p-2 rounded-xl text-[10px] font-bold transition border-gray-100 text-gray-400";
        });
        
        const activeBtn = document.getElementById(`status-${app.status}`);
        if(app.status === 'završeno') activeBtn.classList.add("bg-green-600", "text-white", "border-green-600");
        else activeBtn.classList.add("bg-as-accent", "text-white", "border-as-accent");

        document.getElementById("appointmentModal").classList.remove("hidden");
      }

      function closeModal() { document.getElementById("appointmentModal").classList.add("hidden"); }

      /**
       * KALENDAR (Mesečni prikaz)
       */
      function toggleView(view) {
        const list = document.getElementById("listViewContainer");
        const month = document.getElementById("monthView");
        const bL = document.getElementById("btn-list");
        const bM = document.getElementById("btn-month");

        if (view === "month") {
          list.classList.add("hidden"); month.classList.remove("hidden");
          bM.classList.add("bg-as-accent", "text-white", "shadow-md"); bL.classList.remove("bg-as-accent", "text-white", "shadow-md");
          renderMonthView();
        } else {
          list.classList.remove("hidden"); month.classList.add("hidden");
          bL.classList.add("bg-as-accent", "text-white", "shadow-md"); bM.classList.remove("bg-as-accent", "text-white", "shadow-md");
        }
      }

      async function renderMonthView() {
        const grid = document.getElementById("calendarGrid");
        const label = document.getElementById("currentMonthYear");
        grid.innerHTML = "";
        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        const monthNames = ["Januar", "Februar", "Mart", "April", "Maj", "Jun", "Jul", "Avgust", "Septembar", "Oktobar", "Novembar", "Decembar"];
        label.innerText = `${monthNames[month]} ${year}`;

        const res = await fetch(`http://localhost:3000/api/appointments/${encodeURIComponent(user.serviceName)}`);
        const appointments = await res.json();

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let offset = firstDay === 0 ? 6 : firstDay - 1;

        for (let i = 0; i < offset; i++) grid.innerHTML += `<div class="bg-gray-50/50 min-h-[100px] border-t border-gray-100"></div>`;

        for (let d = 1; d <= daysInMonth; d++) {
          const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const dayApps = appointments.filter(a => a.time.startsWith(dateStr));
          
          grid.innerHTML += `
            <div class="bg-white min-h-[120px] p-2 border-t border-gray-100 hover:bg-blue-50/30 transition relative">
              <span class="text-xs font-bold text-gray-400">${d}</span>
              <div class="mt-1">
                ${dayApps.map(a => `<div onclick='event.stopPropagation(); openAppointmentModal(${JSON.stringify(a)})' class="text-[9px] bg-as-accent/10 text-as-accent p-1 rounded mb-1 truncate font-bold border-l-2 border-as-accent cursor-pointer hover:bg-as-accent hover:text-white">${a.car.split(' ')[0]}</div>`).join('')}
              </div>
            </div>`;
        }
      }

      function changeMonth(dir) { currentViewDate.setMonth(currentViewDate.getMonth() + dir); renderMonthView(); }
      function logout() { localStorage.removeItem("user"); window.location.href = "/login.html"; }

      document.addEventListener("DOMContentLoaded", loadCalendar);
    </script>
  </body>
</html>
