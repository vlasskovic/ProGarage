<!doctype html>
<html lang="sr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProGarage | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "as-bg": "#dde0e4",
              "as-accent": "#6599d3",
              "as-text": "#000000",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-as-bg font-sans">
    <script>
      const user = JSON.parse(localStorage.getItem("user"));
      if (!user) {
        window.location.href = "/login.html";
      }
    </script>

    <div class="flex h-screen">
      <aside class="w-64 bg-white shadow-xl flex flex-col p-6">
        <div class="text-2xl font-black mb-10 text-as-text">
          Pro<span class="text-as-accent">Garage</span>
        </div>
        <nav class="space-y-4 flex-1">
          <a
            href="#"
            class="block p-3 rounded-xl bg-as-accent text-white font-bold shadow-md"
            >🏠 Dashboard</a
          >
          <a
            href="/calendar.html"
            class="block p-3 rounded-xl hover:bg-gray-100 transition"
            >📅 Kalendar</a
          >
          <a
            href="/inventory.html"
            class="block p-3 rounded-xl hover:bg-gray-100 transition"
            >📦 Magacin</a
          >

          <div
            id="ownerMenu"
            class="hidden border-t border-gray-100 pt-4 mt-4 space-y-2"
          >
            <p class="text-[10px] font-bold text-gray-400 uppercase px-3 mb-2">
              Administracija
            </p>
            <button
              onclick="openWorkerModal()"
              class="w-full text-left p-3 rounded-xl hover:bg-blue-50 text-as-accent font-bold transition flex items-center"
            >
              <span class="mr-2">➕</span> Dodaj Radnika
            </button>
          </div>
        </nav>
        <button
          onclick="logout()"
          class="mt-auto text-red-500 font-bold p-3 hover:bg-red-50 rounded-xl transition text-left"
        >
          🚪 Odjavi se
        </button>
      </aside>

      <main class="flex-1 overflow-y-auto p-8">
        <header class="flex justify-between items-center mb-10">
          <div>
            <h1 class="text-3xl font-black" id="welcomeText">Dobrodošli!</h1>
            <p class="text-gray-500 font-medium" id="serviceNameDisplay"></p>
          </div>
          <div class="flex items-center space-x-4">
            <span
              id="planBadge"
              class="hidden bg-white px-4 py-2 rounded-full shadow-sm text-xs font-bold uppercase tracking-wider"
            ></span>
            <div
              class="w-12 h-12 rounded-2xl bg-as-accent flex items-center justify-center text-white font-bold text-xl shadow-lg"
              id="userInitial"
            ></div>
          </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
          <div
            id="statsRevenue"
            class="hidden bg-white p-6 rounded-3xl shadow-sm border-b-4 border-as-accent"
          >
            <p class="text-xs font-bold text-gray-400 uppercase mb-1">
              Prihodi (Mesec)
            </p>
            <h2 class="text-3xl font-black text-as-text">0 €</h2>
          </div>
          <div
            class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-yellow-400"
          >
            <p class="text-xs font-bold text-gray-400 uppercase mb-1">
              Aktivni Servisi
            </p>
            <h2
              class="text-3xl font-black text-as-text"
              id="activeAppointmentsCount"
            >
              0
            </h2>
          </div>
          <div
            class="bg-white p-6 rounded-3xl shadow-sm border-b-4 border-red-400"
          >
            <p class="text-xs font-bold text-gray-400 uppercase mb-1">
              Kritični Delovi
            </p>
            <h2
              class="text-3xl font-black text-red-500"
              id="criticalPartsCount"
            >
              0
            </h2>
          </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
          <div class="bg-white p-8 rounded-3xl shadow-sm">
            <h3 class="font-black text-xl mb-6">Naredni servisi</h3>
            <div id="appointmentsList" class="space-y-4">
              <p class="text-gray-400 text-sm italic">
                Nema zakazanih servisa.
              </p>
            </div>
          </div>

          <div
            id="workersSection"
            class="hidden bg-white p-8 rounded-3xl shadow-sm"
          >
            <div class="flex justify-between items-center mb-6">
              <h3 class="font-black text-xl">Zaposleni radnici</h3>
              <span
                id="workerLimitBadge"
                class="text-xs font-bold bg-as-bg px-3 py-1 rounded-full"
              ></span>
            </div>
            <div id="workersList" class="space-y-4"></div>
          </div>
        </div>
      </main>
    </div>

    <div
      id="workerModal"
      class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50"
    >
      <div
        class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 transform transition-all"
      >
        <h3 class="text-2xl font-black mb-6">
          Dodaj novog <span class="text-as-accent">radnika</span>
        </h3>
        <form id="addWorkerForm" class="space-y-4">
          <input
            type="email"
            id="workerEmail"
            placeholder="Email radnika"
            required
            class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-as-accent"
          />
          <input
            type="password"
            id="workerPass"
            placeholder="Lozinka za radnika"
            required
            class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-as-accent"
          />
          <div class="flex space-x-3 pt-4">
            <button
              type="button"
              onclick="closeWorkerModal()"
              class="flex-1 py-3 font-bold text-gray-400 hover:text-gray-600 transition"
            >
              Odustani
            </button>
            <button
              type="submit"
              class="flex-1 bg-as-accent text-white font-bold py-3 rounded-xl shadow-lg"
            >
              KREIRAJ NALOG
            </button>
          </div>
        </form>
      </div>
    </div>

    <script>
      let dashboardAutoRefresh = null;

      async function loadDashboardStats() {
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user?.serviceName) return;

        try {
          const res = await fetch(
            `http://localhost:3000/api/stats/${encodeURIComponent(user.serviceName)}`,
          );
          const stats = await res.json();

          const revenueEl = document.querySelector("#statsRevenue h2");
          if (revenueEl) {
            revenueEl.innerText = `${Number(stats.revenue || 0).toLocaleString("sr-RS", { minimumFractionDigits: 2, maximumFractionDigits: 2 })} €`;
          }

          const activeCountEl = document.getElementById("activeAppointmentsCount");
          if (activeCountEl) {
            activeCountEl.innerText = stats.activeCount ?? 0;
          }

          const criticalCountEl = document.querySelector(".border-red-400 h2");
          if (criticalCountEl) {
            criticalCountEl.innerText = stats.criticalCount ?? 0;
            if ((stats.criticalCount ?? 0) === 0) {
              criticalCountEl.classList.remove("text-red-500");
              criticalCountEl.classList.add("text-gray-400");
            } else {
              criticalCountEl.classList.add("text-red-500");
              criticalCountEl.classList.remove("text-gray-400");
            }
          }
        } catch (error) {
          console.error("Greška pri učitavanju statistike:", error);
        }
      }

      async function refreshDashboardData() {
        await Promise.all([
          loadDashboardStats(),
          loadUpcomingAppointments(),
        ]);
      }

      // Inicijalizacija Dashboarda
      document.addEventListener("DOMContentLoaded", async () => {
        const user = JSON.parse(localStorage.getItem("user"));

        if (!user) return;

        document.getElementById("welcomeText").innerText =
          `Zdravo, ${user.email.split("@")[0]}!`;
        document.getElementById("serviceNameDisplay").innerText =
          user.serviceName || "Samostalni radnik";
        document.getElementById("userInitial").innerText =
          user.email[0].toUpperCase();

        if (user.role === "servis") {
          document.getElementById("ownerMenu").classList.remove("hidden");
          document.getElementById("statsRevenue").classList.remove("hidden");
          document.getElementById("workersSection").classList.remove("hidden");
          loadWorkers();

          if (user.plan) {
            const badge = document.getElementById("planBadge");
            badge.innerText = `Plan: ${user.plan}`;
            badge.classList.remove("hidden");
            badge.classList.add(
              user.plan === "pro" ? "text-as-accent" : "text-gray-400",
            );
          }
        }

        await refreshDashboardData();

        if (dashboardAutoRefresh) clearInterval(dashboardAutoRefresh);
        dashboardAutoRefresh = setInterval(refreshDashboardData, 5000);
      });

      window.addEventListener("storage", (event) => {
        if (event.key === "dashboardRefreshSignal") {
          refreshDashboardData();
        }
      });

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          refreshDashboardData();
        }
      });

      // Funkcija za dodavanje radnika
      document
        .getElementById("addWorkerForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const owner = JSON.parse(localStorage.getItem("user"));

          const workerData = {
            email: document.getElementById("workerEmail").value,
            password: document.getElementById("workerPass").value,
            role: "radnik",
            serviceName: owner.serviceName,
            parentId: owner.id,
          };

          const res = await fetch("http://localhost:3000/api/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(workerData),
          });

          if (res.ok) {
            closeWorkerModal();
            document.getElementById("addWorkerForm").reset();
            loadWorkers(); // Osveži listu odmah
          }
        });

      async function loadUpcomingAppointments() {
        const user = JSON.parse(localStorage.getItem("user"));
        const res = await fetch(
          `http://localhost:3000/api/appointments/${encodeURIComponent(user.serviceName)}`,
        );
        const appointments = await res.json();

        const listContainer = document.getElementById("appointmentsList");

        // 1. Filtriramo samo one koji nisu završeni
        // 2. Sortiramo ih od najbližeg ka najdaljem
        const upcoming = appointments
          .filter((a) => a.status !== "završeno")
          .sort((a, b) => new Date(a.time) - new Date(b.time))
          .slice(0, 3); // Uzimamo samo prva 3

        if (upcoming.length === 0) {
          listContainer.innerHTML =
            '<p class="text-gray-400 text-sm italic">Nema zakazanih servisa.</p>';
          return;
        }

        listContainer.innerHTML = ""; // Brišemo placeholder

        upcoming.forEach((app) => {
          const date = new Date(app.time);
          const formattedDate = date.toLocaleDateString("sr-RS", {
            day: "2-digit",
            month: "2-digit",
          });
          const formattedTime = date.toLocaleTimeString("sr-RS", {
            hour: "2-digit",
            minute: "2-digit",
          });

          listContainer.innerHTML += `
            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl border border-transparent hover:border-as-accent transition-all group">
                <div class="flex items-center space-x-4">
                    <div class="text-center bg-white p-2 rounded-xl shadow-sm min-w-[55px]">
                        <p class="text-[10px] font-black text-as-accent uppercase">${formattedDate}</p>
                        <p class="text-sm font-bold">${formattedTime}</p>
                    </div>
                    <div>
                        <p class="font-black text-as-text">${app.car}</p>
                        <p class="text-xs text-gray-500 font-medium">${app.serviceType}</p>
                    </div>
                </div>
                <div class="flex items-center">
                    <span class="text-[9px] font-black px-3 py-1 rounded-full ${getStatusStyle(app.status)}">
                        ${app.status.toUpperCase()}
                    </span>
                </div>
            </div>
        `;
        });
      }

      // Pomoćna funkcija za boje statusa
      function getStatusStyle(status) {
        switch (status) {
          case "u_toku":
            return "bg-yellow-100 text-yellow-600";
          case "zakazano":
            return "bg-blue-100 text-blue-600";
          default:
            return "bg-gray-100 text-gray-500";
        }
      }

      async function loadWorkers() {
        const user = JSON.parse(localStorage.getItem("user"));
        const res = await fetch(
          `http://localhost:3000/api/workers/${encodeURIComponent(user.serviceName)}`,
        );
        const workers = await res.json();

        const list = document.getElementById("workersList");
        const limitBadge = document.getElementById("workerLimitBadge");

        // Prikazuje samo ukupan broj bez limita
        limitBadge.innerText = `Ukupno radnika: ${workers.length}`;

        list.innerHTML = workers.length
          ? ""
          : '<p class="text-gray-400 text-sm italic text-center py-4">Nema dodatih radnika.</p>';

        workers.forEach((w) => {
          list.innerHTML += `
      <div class="flex items-center justify-between p-4 bg-as-bg rounded-2xl group transition hover:bg-white hover:shadow-md border border-transparent hover:border-as-accent">
          <div class="flex items-center space-x-3">
              <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center font-bold text-as-accent shadow-sm">${w.email[0].toUpperCase()}</div>
              <div>
                  <p class="font-bold text-sm">${w.email}</p>
                  <p class="text-[10px] text-gray-500 uppercase font-semibold">Radnik</p>
              </div>
          </div>
          <button onclick="deleteWorker(${w.id})" class="text-gray-400 hover:text-red-500 p-2 transition transform hover:scale-110">
              🗑️
          </button>
      </div>
    `;
        });
      }

      async function deleteWorker(id) {
        if (confirm("Da li ste sigurni da želite da obrišete ovog radnika?")) {
          const res = await fetch(`http://localhost:3000/api/workers/${id}`, {
            method: "DELETE",
          });
          if (res.ok) loadWorkers();
        }
      }

      function logout() {
        localStorage.removeItem("user");
        window.location.href = "/login.html";
      }

      function openWorkerModal() {
        document.getElementById("workerModal").classList.remove("hidden");
      }

      function closeWorkerModal() {
        document.getElementById("workerModal").classList.add("hidden");
      }
    </script>
  </body>
</html>
